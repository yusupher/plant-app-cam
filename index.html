<!DOCTYPE html>
<html>
<head>
  <title>Plant Identifier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:0; background:#eef5ee; }
    header { background:#2e7d32; color:white; padding:15px; text-align:center; }
    .container { padding:20px; }
    .card { background:white; padding:15px; border-radius:10px; }
    input, button { width:100%; padding:12px; margin-top:10px; }
    button { background:#2e7d32; color:white; border:none; }
    img { width:100%; margin-top:10px; display:none; border-radius:10px; }
    #result { white-space:pre-line; margin-top:10px; font-weight:bold; }
  </style>
</head>

<body>

<header>
🌿 Plant Identifier App
</header>

<div class="container">

  <div class="card">

    <input type="file" id="img" accept="image/*" capture="environment">

    <img id="preview">

    <button onclick="identify()">Identify Plant</button>

    <div id="result"></div>

  </div>

</div>

<script>

const img = document.getElementById("img");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

img.onchange = () => {
  preview.src = URL.createObjectURL(img.files[0]);
  preview.style.display = "block";
};

async function identify() {

  if (!img.files.length) {
    result.innerText = "Select image first";
    return;
  }

  result.innerText = "Analyzing...";

  const form = new FormData();
  form.append("image", img.files[0]);

  const response = await fetch("https://YOUR-BACKEND-URL.onrender.com/identify", {
    method: "POST",
    body: form
  });

  const data = await response.json();

  if (!data.results) {
    result.innerText = "No plant found";
    return;
  }

  let output = "";

  data.results.slice(0,3).forEach((r,i) => {
    output +=
      (i+1)+". 🌿 "+r.species.scientificNameWithoutAuthor+"\n"+
      "🌱 "+(r.species.commonNames[0]||"N/A")+"\n"+
      "📊 "+(r.score*100).toFixed(2)+"%\n\n";
  });

  result.innerText = output;
}

</script>

</body>
</html>
